<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A0C14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>KAMP / VIP Sürüm V7.0</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg:        #0A0C14; --bg-2:      #0E1120; --panel:     rgba(255,255,255,0.045); --panel-2:   rgba(255,255,255,0.03); --panel-solid: #141828;
    --line:      rgba(255,255,255,0.09); --line-soft: rgba(255,255,255,0.06); --ink:       #F3F4FA; --ink-dim:   #9499B3; --ink-faint: #5C6180;
    --violet:    #8C7CFF; --violet-2:  #5B8DFF; --mint:      #3DDC97; --coral:     #FF7A9C;
    --grad-brand: linear-gradient(135deg, #8C7CFF 0%, #5B8DFF 100%);
    --radius:    22px; --radius-sm: 14px; --font-display: 'Sora', sans-serif; --font-mono:    'JetBrains Mono', monospace;
    --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body{ background: var(--bg); color: var(--ink); font-family: var(--font-mono); overscroll-behavior-y: none; }
  body{ min-height: 100vh; background-image: radial-gradient(circle at 12% -8%, rgba(140,124,255,0.22), transparent 42%), radial-gradient(circle at 105% 18%, rgba(91,141,255,0.16), transparent 38%), radial-gradient(circle at 50% 100%, rgba(61,220,151,0.07), transparent 45%); background-attachment: fixed; }
  
  /* GİRİŞ EKRANI (VIP) */
  #authScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; z-index: 1000; position: relative; }
  .auth-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 30px 20px; width: 100%; max-width: 360px; backdrop-filter: blur(18px); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .auth-card h1 { font-family: var(--font-display); font-size: 24px; margin-bottom: 5px; background: var(--grad-brand); -webkit-background-clip: text; color: transparent; }
  .auth-card p { font-size: 11px; color: var(--ink-faint); margin-bottom: 25px; letter-spacing: 0.1em; text-transform: uppercase; }
  .auth-input { width: 100%; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 14px; color: var(--ink); font-family: var(--font-mono); font-size: 15px; margin-bottom: 12px; outline: none; }
  .auth-input:focus { border-color: var(--violet); }
  .btn-auth { width: 100%; background: var(--grad-brand); border: none; border-radius: 14px; color: #0A0C14; font-family: var(--font-display); font-weight: 700; font-size: 16px; padding: 15px; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(124,108,255,0.3); }
  #authError { color: var(--coral); font-size: 12px; margin-top: 15px; display: none; }

  /* ANA UYGULAMA STİLLERİ */
  #mainApp { display: none; max-width: 480px; margin: 0 auto; padding: calc(var(--safe-top) + 10px) 16px calc(var(--safe-bottom) + 28px); }
  .hazard-strip{ height: 3px; width: 100%; background: var(--grad-brand); opacity: 0.85; position: fixed; top: 0; left: 0; z-index: 50; }
  
  header.camp-header{ padding: 26px 4px 20px; display:flex; align-items:flex-start; justify-content:space-between; gap: 16px; }
  .camp-id{ display:flex; flex-direction:column; gap: 7px; }
  .camp-id .eyebrow{ font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; color: var(--ink-faint); text-transform: uppercase; }
  .camp-id .date-row{ display:flex; align-items:center; gap: 8px; }
  .date-nav-btn { background: transparent; border: none; color: var(--violet); font-size: 20px; cursor: pointer; padding: 0 6px; }
  .camp-id .date-value{ font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--ink); min-width: 110px; text-align: center; }
  
  .day-plate{ flex-shrink:0; background: var(--panel-solid); border: 1px solid var(--line); border-radius: 18px; padding: 10px 18px 12px; text-align:center; position:relative; min-width: 104px; }
  .day-plate::before{ content:""; position:absolute; inset:-1px; border-radius: 18px; padding: 1px; background: var(--grad-brand); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.55; pointer-events:none; }
  .day-plate .plate-label{ font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.2em; color: var(--violet); text-transform: uppercase; }
  .day-plate .plate-number{ font-family: var(--font-display); font-weight: 800; font-size: 36px; line-height: 1.15; background: var(--grad-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .day-plate .plate-number span.zero{ opacity: 0.3; color: var(--ink-faint); -webkit-text-fill-color: var(--ink-faint); } 

  .stack{ display:flex; flex-direction:column; gap: 14px; }
  section.card{ background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow:hidden; backdrop-filter: blur(18px); }
  .card-head{ display:flex; align-items:center; justify-content:space-between; padding: 16px 18px 0; }
  .card-head .tag{ display:flex; align-items:center; gap: 9px; }
  .card-head .tag .dot{ width:7px; height:7px; border-radius:50%; background: var(--grad-brand); }
  .card-head h2{ font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--ink); }
  .card-head .hint{ font-size: 10px; color: var(--ink-faint); letter-spacing: 0.06em; text-transform: uppercase; }
  .card-body{ padding: 14px 18px 20px; }

  .field-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field{ display:flex; flex-direction:column; gap:7px; }
  .field label{ font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-dim); display:flex; justify-content:space-between; }
  .field label .unit{ color: var(--ink-faint); font-size: 9px; }

  .input-shell{ position:relative; display:flex; align-items:center; background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); }
  .input-shell input, .input-shell select, .note-shell textarea{ appearance:none; -webkit-appearance:none; width:100%; background: transparent; border:none; outline:none; color: var(--ink); font-family: var(--font-mono); font-weight: 600; font-size: 16px; padding: 13px 14px; }
  .input-shell input::placeholder, .note-shell textarea::placeholder{ color: var(--ink-faint); font-weight: 400; }
  .input-shell.accent-fire{ border-left: 3px solid var(--coral); }
  .input-shell.accent-acid{ border-left: 3px solid var(--mint); }
  .input-shell.accent-blue{ border-left: 3px solid var(--violet-2); }
  
  .weight-row, .calorie-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .macro-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .note-shell{ background: var(--panel-2); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); overflow:hidden; }
  .note-shell textarea{ min-height: 96px; resize: vertical; line-height: 1.6; }

  .pdf-container{ display:flex; flex-direction:column; gap: 10px; }
  .btn-view-pdf{ display:none; background: rgba(61,220,151,0.1); border: 1px solid var(--mint); color: var(--mint); font-family: var(--font-display); font-weight: 600; text-align:center; text-decoration:none; padding: 12px; border-radius: 12px; font-size: 14px; }

  .save-zone{ margin-top: 20px; padding-bottom: 4px; }
  .btn-save{ width:100%; border:none; border-radius: 18px; background: var(--grad-brand); color: #0A0C14; font-family: var(--font-display); font-weight: 700; font-size: 16px; padding: 17px; box-shadow: 0 14px 34px rgba(124,108,255,0.32); cursor:pointer;}
  
  .top-bar { display: flex; justify-content: flex-end; padding-top: 10px; }
  .btn-logout { background: transparent; border: 1px solid var(--coral); color: var(--coral); padding: 5px 12px; border-radius: 8px; font-size: 10px; font-family: var(--font-mono); cursor: pointer; }
</style>
</head>
<body>

<!-- GİRİŞ EKRANI (VIP KAPI) -->
<div id="authScreen">
  <div class="auth-card">
    <h1>KAMP GÜNLÜĞÜM</h1>
    <p>VIP Erişim Ekranı</p>
    <input type="email" id="emailInput" class="auth-input" placeholder="E-posta Adresi">
    <input type="password" id="passwordInput" class="auth-input" placeholder="Şifre">
    <button id="loginBtn" class="btn-auth">KASAYI AÇ</button>
    <div id="authError">Giriş başarısız. Bilgileri kontrol et.</div>
  </div>
</div>

<!-- ANA UYGULAMA (GİRİŞ YAPILINCA AÇILIR) -->
<div id="mainApp">
  <div class="hazard-strip"></div>
  
  <div class="top-bar">
    <button id="logoutBtn" class="btn-logout">Çıkış Yap Kilit Kapat</button>
  </div>

  <header class="camp-header">
    <div class="camp-id">
      <span class="eyebrow">Operasyon Günlüğü</span>
      <div class="date-row">
        <button id="prevDayBtn" class="date-nav-btn">&#8592;</button>
        <span class="date-value" id="displayDate">19 Haziran</span>
        <button id="nextDayBtn" class="date-nav-btn">&#8594;</button>
      </div>
      <div style="display:none;"><input type="date" id="logDate" value="2026-06-19"></div>
    </div>
    <div class="day-plate">
      <span class="plate-label">Kamp Gün</span>
      <div class="plate-number" id="campDayNumber">0<span class="zero">01</span></div>
    </div>
  </header>

  <div class="stack">
    <!-- DRIVE LİNK KARTI (GÜNCELLENDİ) -->
    <section class="card">
      <div class="card-head"><div class="tag"><span class="dot" style="background: var(--coral);"></span><h2>Dosya / PDF Linki</h2></div><span class="hint">Google Drive</span></div>
      <div class="card-body">
        <div class="pdf-container">
          <div class="input-shell accent-fire">
            <input type="url" id="pdfLinkInput" placeholder="Drive belge linkini buraya yapıştır...">
          </div>
          <a href="#" id="viewPdfBtn" class="btn-view-pdf" target="_blank">📄 Kayıtlı Belgeyi Aç</a>
        </div>
      </div>
    </section>

    <!-- SABAH TARTISI -->
    <section class="card">
      <div class="card-head"><div class="tag"><span class="dot"></span><h2>Sabah Tartısı</h2></div></div>
      <div class="card-body">
        <div class="weight-row">
          <div class="field"><label>Kilo <span class="unit">KG</span></label><div class="input-shell accent-acid"><input type="number" step="0.1" id="weightValue"></div></div>
          <div class="field"><label>Yağ Oranı <span class="unit">%</span></label><div class="input-shell accent-fire"><input type="number" step="0.1" id="bodyFatValue"></div></div>
        </div>
      </div>
    </section>

    <!-- AKTİVİTE -->
    <section class="card">
      <div class="card-head"><div class="tag"><span class="dot" style="background: var(--violet-2);"></span><h2>Aktivite & Uyku</h2></div></div>
      <div class="card-body">
        <div class="field-grid">
          <div class="field" style="grid-column: span 2;"><label>Adım <span class="unit">SAYI</span></label><div class="input-shell accent-acid"><input type="number" id="stepsValue"></div></div>
          <div class="field"><label>Uyku Süresi <span class="unit">SA</span></label><div class="input-shell accent-blue"><input type="number" id="sleepHours"></div></div>
          <div class="field"><label>Uyku Puanı <span class="unit">MAX 100</span></label><div class="input-shell accent-blue"><input type="number" id="sleepScore"></div></div>
        </div>
      </div>
    </section>

    <!-- BESLENME VE NOTLAR -->
    <section class="card">
      <div class="card-head"><div class="tag"><span class="dot"></span><h2>Beslenme (KCAL)</h2></div></div>
      <div class="card-body">
        <div class="calorie-row">
          <div class="field"><label>Alınan <span class="unit">KCAL</span></label><div class="input-shell accent-acid"><input type="number" id="caloriesIn"></div></div>
          <div class="field"><label>Yakılan <span class="unit">KCAL</span></label><div class="input-shell accent-fire"><input type="number" id="caloriesOut"></div></div>
        </div>
      </div>
    </section>
    
    <section class="card">
      <div class="card-head"><div class="tag"><span class="dot"></span><h2>Günün Notu</h2></div></div>
      <div class="card-body">
        <div class="note-shell"><textarea id="dayNote" placeholder="Tahlil sonuçları veya günün özeti..."></textarea></div>
      </div>
    </section>
  </div>

  <div class="save-zone"><button class="btn-save" id="saveBtn" type="button">⛺ VIP KASAYA KAYDET</button></div>
</div>

<!-- FIREBASE MOTORLARI (AUTH VE FIRESTORE) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBQX1kjUu40_rEvvYJZFM8rmWu9lyHXMU0",
    authDomain: "kampgunlugum2.firebaseapp.com",
    projectId: "kampgunlugum2",
    storageBucket: "kampgunlugum2.firebasestorage.app",
    messagingSenderId: "596003065684",
    appId: "1:596003065684:web:e50e96688eb03dff33c2c1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // --- GİRİŞ SİSTEMİ KONTROLÜ ---
  const authScreen = document.getElementById("authScreen");
  const mainApp = document.getElementById("mainApp");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const authError = document.getElementById("authError");

  // Kullanıcı durumu değiştiğinde (Girdi/Çıktı)
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Giriş başarılı, ana uygulamayı göster
      authScreen.style.display = "none";
      mainApp.style.display = "block";
      loadDayData(document.getElementById("logDate").value); // Verileri getir
    } else {
      // Çıkış yapıldı veya giriş yok, kilit ekranını göster
      authScreen.style.display = "flex";
      mainApp.style.display = "none";
    }
  });

  // Giriş Yap Butonu
  loginBtn.addEventListener("click", () => {
    const email = document.getElementById("emailInput").value;
    const pass = document.getElementById("passwordInput").value;
    loginBtn.innerText = "Bekle...";
    
    signInWithEmailAndPassword(auth, email, pass)
      .then(() => { authError.style.display = "none"; loginBtn.innerText = "KASAYI AÇ"; })
      .catch((error) => { authError.style.display = "block"; loginBtn.innerText = "KASAYI AÇ"; });
  });

  // Çıkış Yap Butonu
  logoutBtn.addEventListener("click", () => {
    signOut(auth).then(() => {
      document.getElementById("emailInput").value = "";
      document.getElementById("passwordInput").value = "";
    });
  });


  // --- ANA UYGULAMA MOTORU ---
  const logDateInput = document.getElementById("logDate");
  const displayDate = document.getElementById("displayDate");
  const campDayNumber = document.getElementById("campDayNumber");

  function clearFields() {
    document.querySelectorAll("#mainApp input[type='number'], #mainApp input[type='url'], #mainApp textarea").forEach(el => el.value = "");
    document.getElementById("viewPdfBtn").style.display = "none";
  }

  async function loadDayData(dateStr) {
    clearFields();
    document.getElementById("displayDate").innerText = "Yükleniyor...";
    
    const [year, month, day] = dateStr.split('-');
    const selectedDate = new Date(year, month - 1, day);
    displayDate.innerText = selectedDate.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long' });
    
    const baseDate = new Date(2026, 5, 19); 
    let diffDays = Math.round((selectedDate.getTime() - baseDate.getTime()) / (1000 * 3600 * 24)) + 1;
    campDayNumber.innerHTML = diffDays > 0 ? (diffDays < 10 ? '<span class="zero">00</span>'+diffDays : diffDays) : "00";

    try {
      const docSnap = await getDoc(doc(db, "kamp_logs", dateStr));
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("weightValue").value = data.weight || "";
        document.getElementById("bodyFatValue").value = data.bodyFat || "";
        document.getElementById("stepsValue").value = data.steps || "";
        document.getElementById("sleepHours").value = data.sleep || "";
        document.getElementById("caloriesIn").value = data.calIn || "";
        document.getElementById("caloriesOut").value = data.calOut || "";
        document.getElementById("dayNote").value = data.note || "";
        document.getElementById("pdfLinkInput").value = data.driveLink || "";
        
        if (data.driveLink) {
          const viewBtn = document.getElementById("viewPdfBtn");
          viewBtn.href = data.driveLink;
          viewBtn.style.display = "block";
        }
      }
    } catch(e) { console.error("Okuma hatası", e); }
  }

  function shiftDate(days) {
    const [year, month, day] = logDateInput.value.split('-');
    const current = new Date(year, month - 1, day);
    current.setDate(current.getDate() + days);
    const y = current.getFullYear();
    const m = String(current.getMonth() + 1).padStart(2, '0');
    const d = String(current.getDate()).padStart(2, '0');
    logDateInput.value = `${y}-${m}-${d}`;
    loadDayData(logDateInput.value);
  }

  document.getElementById("prevDayBtn").addEventListener("click", () => shiftDate(-1));
  document.getElementById("nextDayBtn").addEventListener("click", () => shiftDate(1));

  // Kaydetme
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.addEventListener("click", async () => {
    saveBtn.innerText = "⏳ Şifreli Kasaya Yazılıyor...";
    saveBtn.disabled = true;

    const dateStr = logDateInput.value;
    const payload = {
      date: dateStr,
      weight: document.getElementById("weightValue").value,
      bodyFat: document.getElementById("bodyFatValue").value,
      steps: document.getElementById("stepsValue").value,
      sleep: document.getElementById("sleepHours").value,
      calIn: document.getElementById("caloriesIn").value,
      calOut: document.getElementById("caloriesOut").value,
      note: document.getElementById("dayNote").value,
      driveLink: document.getElementById("pdfLinkInput").value // Drive Linki Burada Kaydedilir
    };

    try {
      await setDoc(doc(db, "kamp_logs", dateStr), payload);
      saveBtn.innerText = "✅ VIP KAYIT BAŞARILI";
      loadDayData(dateStr); 
      setTimeout(() => { saveBtn.innerText = "⛺ VIP KASAYA KAYDET"; saveBtn.disabled = false; }, 2000);
    } catch (e) {
      saveBtn.innerText = "❌ Hata Oluştu";
      setTimeout(() => { saveBtn.innerText = "⛺ VIP KASAYA KAYDET"; saveBtn.disabled = false; }, 3000);
    }
  });
</script>
</body>
</html>
